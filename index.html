<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Casino</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #111; color: #eee; }
  header { background: #0a0a0a; padding: 1em 2em; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
  header h1 { color: #00e5ff; font-size: 1.3em; }
  #user-bar { font-size: 0.9em; }
  #user-bar .balance { color: #00e676; font-weight: bold; margin-right: 1em; }
  #user-bar a { color: #00e5ff; text-decoration: none; margin-left: 1em; cursor: pointer; }
  main { padding: 2em; max-width: 1200px; margin: auto; }
  .form-card { background: #1a1a1a; padding: 2em; max-width: 360px; margin: 2em auto; border-radius: 8px; }
  .form-card h2 { margin-bottom: 1em; color: #00e5ff; }
  .form-card input { width: 100%; padding: 0.7em; margin-bottom: 0.7em; background: #222; border: 1px solid #444; color: #eee; border-radius: 4px; font-size: 14px; }
  .form-card button { width: 100%; padding: 0.8em; background: #00e5ff; color: #000; border: 0; border-radius: 4px; font-weight: bold; cursor: pointer; }
  .form-card .switch { text-align: center; margin-top: 1em; font-size: 0.9em; }
  .form-card .switch a { color: #00e5ff; cursor: pointer; }
  .bonus { background: rgba(0,230,118,0.1); color: #00e676; padding: 0.7em; border-radius: 4px; margin-bottom: 1em; text-align: center; font-size: 0.9em; }
  .error { color: #ff4444; margin-top: 0.5em; font-size: 0.85em; }
  .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1em; }
  .game-card { background: #1a1a1a; padding: 1em; border-radius: 8px; cursor: pointer; transition: transform 0.2s; text-align: center; }
  .game-card:hover { transform: translateY(-3px); }
  .game-card img { width: 100%; height: 140px; object-fit: cover; background: #333; border-radius: 4px; margin-bottom: 0.5em; }
  .game-card h3 { color: #00e5ff; font-size: 1em; }
  .game-card .rtp { color: #888; font-size: 0.8em; margin-top: 0.3em; }
  .empty { text-align: center; padding: 3em; color: #666; }
  .iframe-wrap { width: 100%; height: calc(100vh - 80px); }
  .iframe-wrap iframe { width: 100%; height: 100%; border: 0; }
  .message { padding: 1em; background: #1a1a1a; border-radius: 8px; max-width: 500px; margin: 2em auto; text-align: center; }
  .message .small { color: #888; font-size: 0.85em; margin-top: 0.7em; }
</style>
</head>
<body>

<header>
  <h1>My Casino</h1>
  <div id="user-bar"></div>
</header>

<main id="app"></main>

<script>
const API = 'https://jaafar.ngrok.app/api';
const app = document.getElementById('app');
const userBar = document.getElementById('user-bar');

function getToken() { return localStorage.getItem('token'); }
function setSession(token, playerId) { localStorage.setItem('token', token); localStorage.setItem('player_id', playerId); }
function clearSession() { localStorage.removeItem('token'); localStorage.removeItem('player_id'); }

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  const token = getToken();
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const r = await fetch(API + path, { ...opts, headers });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.detail || data.error || 'request failed');
  return data;
}

function go(route) { location.hash = route; render(); }
window.go = go;
window.logout = function() { clearSession(); go('login'); };
window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', render);

async function render() {
  const route = location.hash.slice(1) || (getToken() ? 'lobby' : 'login');
  await renderUserBar();
  if (route === 'login') return renderLogin();
  if (route === 'signup') return renderSignup();
  if (route === 'check-email') return renderCheckEmail();
  if (route === 'lobby') return renderLobby();
  if (route.startsWith('play/')) return renderPlay(route.slice(5));
  go('login');
}

async function renderUserBar() {
  if (!getToken()) { userBar.innerHTML = ''; return; }
  try {
    const me = await api('/me');
    userBar.innerHTML = `<span class="balance">${(me.balance_cents / 100).toFixed(2)} ${me.currency}</span><a onclick="go('lobby')">Lobby</a><a onclick="logout()">Logout</a>`;
  } catch (e) { clearSession(); userBar.innerHTML = ''; }
}

function renderLogin() {
  app.innerHTML = `<div class="form-card"><h2>Login</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="pw" type="password" placeholder="Password">
    <button onclick="doLogin()">Login</button>
    <div id="err" class="error"></div>
    <div class="switch">No account? <a onclick="go('signup')">Sign up</a></div></div>`;
}
window.doLogin = async function() {
  const err = document.getElementById('err'); err.textContent = '';
  try {
    const d = await api('/login', { method: 'POST', body: JSON.stringify({
      email: document.getElementById('email').value,
      password: document.getElementById('pw').value })});
    setSession(d.token, d.player_id); go('lobby');
  } catch (e) { err.textContent = e.message; }
};

function renderSignup() {
  app.innerHTML = `<div class="form-card"><h2>Sign up</h2>
    <div class="bonus">🎁 5,000 SC on signup</div>
    <input id="email" type="email" placeholder="Email">
    <input id="pw" type="password" placeholder="Password (min 6)">
    <button onclick="doSignup()">Create account</button>
    <div id="err" class="error"></div>
    <div class="switch">Have an account? <a onclick="go('login')">Login</a></div></div>`;
}
window.doSignup = async function() {
  const err = document.getElementById('err'); err.textContent = '';
  try {
    await api('/signup', { method: 'POST', body: JSON.stringify({
      email: document.getElementById('email').value,
      password: document.getElementById('pw').value })});
    go('check-email');
  } catch (e) { err.textContent = e.message; }
};

function renderCheckEmail() {
  app.innerHTML = `<div class="message"><h2>Check your email</h2>
    <p>We sent you a verification link. Open it to activate your account and get 5000 SC.</p>
    <p class="small">Dev mode: link is printed in the RGS server console.</p>
    <p style="margin-top:1em"><a onclick="go('login')" style="color:#00e5ff;cursor:pointer">Back to login</a></p></div>`;
}

async function renderLobby() {
  if (!getToken()) return go('login');
  app.innerHTML = '<div class="empty">Loading games...</div>';
  try {
    const games = await api('/games');
    if (!games.length) { app.innerHTML = '<div class="empty">No games published yet.</div>'; return; }
    app.innerHTML = '<div class="games-grid">' + games.map(g => `<div class="game-card" onclick="go('play/${g.game_id}')">
      <img src="${g.thumbnail || ''}" onerror="this.style.background='#333'">
      <h3>${g.title}</h3>
      <div class="rtp">RTP ${(g.rtp * 100).toFixed(2)}%</div></div>`).join('') + '</div>';
  } catch (e) { app.innerHTML = `<div class="empty">Error: ${e.message}</div>`; }
}

async function renderPlay(gameId) {
  if (!getToken()) return go('login');
  try {
    const d = await api('/launch', { method: 'POST', body: JSON.stringify({ game_id: gameId })});
    const gameUrl = 'https://jaafar.ngrok.app' + d.play_url;
    app.innerHTML = `<div class="iframe-wrap"><iframe src="${gameUrl}"></iframe></div>`;
  } catch (e) { app.innerHTML = `<div class="empty">Cannot launch: ${e.message}</div>`; }
}
</script>

</body>
</html>
